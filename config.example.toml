# Beamchain - Bitcoin Full Node (Erlang/OTP)
# Example configuration file
# Copy to your data directory and modify as needed.

[network]
# Network: mainnet, testnet, testnet4, regtest, signet
network = "mainnet"

[storage]
# Data directory
datadir = "~/.beamchain"

[rpc]
# RPC port (default: 8332 mainnet, 18332 testnet, 48332 testnet4, 18443 regtest)
rpcport = 8332

[p2p]
# P2P listen port
port = 8333

[mempool]
# (Uses Bitcoin Core defaults internally)

[logging]
# Erlang/OTP logger configuration
# See config/sys.config for detailed OTP settings

[metrics]
# Prometheus metrics endpoint
# enabled = true
# port = 9332
